location: PAGMT 2025 will be held at Palo Alto High School's MAC (Media Arts Center) in Palo Alto, California on Friday, May 9th, 2025 from 5:00 PM to 8:30 PM. Pizza and boba will be provided for all competitors for dinner.
eligibility: PAGMT is open to all middle schoolers who identify as girls. While we are aimed mostly towards PAUSD students, students from other schools are welcome to join as well! Any experience level is welcome, and elementary students are also encouraged to join.
materials: Participants should bring their own pencils, pens, and erasers. Scratch paper will be provided.
problems: Problems will be sorted in ascending difficulty and cover a variety of topics including algebra, geometry, number theory, and combinatorics.
