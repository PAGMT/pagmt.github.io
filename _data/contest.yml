location: PAGMT 2026 will be held at Palo Alto High School's MAC (Media Arts Center) in Palo Alto, California on Friday, May 22nd, 2026 from 4:30 PM to 8:00 PM. Pizza and boba will be provided for all competitors for dinner.
eligibility: PAGMT is open to all 4th to 8th graders who identify as girls. While we are aimed mostly towards PAUSD students, students from other schools are welcome to join as well! Any experience level is welcome.
materials: Participants should bring their own pencils, pens, and erasers. Scratch paper will be provided.
problems: Problems will be sorted in ascending difficulty and cover a variety of topics including algebra, geometry, number theory, and combinatorics.
format: 
  - "The contest will be an individual, 1 hour long exam."
  - "There will be two divisions: the Junior Division for 4th to 6th graders, and the Senior Division for 7th and 8th graders as well as any 4th to 6th graders interested in competing in the Senior Division."
  - "Each division's exam will consist of 30 math problems and 1 estimation problem."
  - "The Junior Division exam will feature easier problems, while the Senior Division exam will feature more advanced concepts."
  - "There will be no appeals or re-grades."
